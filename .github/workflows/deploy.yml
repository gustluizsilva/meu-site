# =====================================================================
# Deploy automático para HostGator via FTP
# Dispara a cada push na branch main.
# Requer 4 secrets configurados no GitHub:
#   FTP_SERVER       (ex: ftp.seudominio.com.br ou IP)
#   FTP_USERNAME     (usuário FTP do cPanel)
#   FTP_PASSWORD     (senha do usuário FTP)
#   FTP_SERVER_DIR   (ex: /public_html/ ou /public_html/portfolio/)
# =====================================================================

name: Deploy para HostGator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Sincronizar arquivos com HostGator via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/CLAUDE.md
            **/Substack/**
            **/.DS_Store
            **/node_modules/**
            **/.vscode/**
            **/.idea/**
            **/*.log
